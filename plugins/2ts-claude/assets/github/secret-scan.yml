name: secret-scan

# Scans for committed secrets on every push and pull request. Runs in CI so it
# reaches every contributor and never blocks local work.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization (non-personal) repos need a free license key from
          # gitleaks.io; set it as a repo/org secret. Personal repos don't.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
